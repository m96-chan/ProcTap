name: Test macOS Process Tap signing

# Manual-only smoke test for the Developer ID signing + notarization of the
# Process Tap helper. Does NOT publish anything — it builds, signs, notarizes,
# staples and uploads the signed .app as an artifact so the release signing
# path can be validated before wiring it into a real release.
#
# The helper sources + ci_sign_notarize.sh live on the feature branch; this
# workflow lives on the default branch (required for workflow_dispatch) and
# checks out the requested ref.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/ref containing the helper sources"
        required: true
        default: "feat/macos-process-tap-helper"

jobs:
  sign-helper:
    runs-on: macos-latest
    steps:
      - name: Checkout helper sources
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Show toolchain
        run: |
          sw_vers
          swift --version
          xcrun --find notarytool

      - name: Build + Developer ID sign + notarize helper
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "::error::Signing secrets are not configured on this repository."
            exit 1
          fi
          bash src/proctap/swift/proctap-helper/ci_sign_notarize.sh

      - name: Verify staged signed app
        run: |
          APP=src/proctap/bin/proctap-helper.app
          echo "== codesign =="
          codesign -dv --verbose=4 "$APP"
          codesign --verify --strict --verbose=2 "$APP"
          echo "== stapler =="
          xcrun stapler validate "$APP"
          echo "== gatekeeper assessment =="
          spctl -a -vvv -t exec "$APP" || true

      - name: Upload signed app artifact
        uses: actions/upload-artifact@v7
        with:
          name: proctap-helper-signed
          path: src/proctap/bin/proctap-helper.app

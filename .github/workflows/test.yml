name: Tests

on:
  push:
    branches:
      - main
      - develop
      - feature/*
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch: {}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        experimental: [false]
        # Track the Python 3.15 pre-release on every OS. allow-prereleases lets
        # actions/setup-python pick up the latest alpha/beta/RC; experimental:
        # true wires continue-on-error so a 3.15 regression does not break the
        # required check while the 3.14 row still gates merges.
        include:
          - os: ubuntu-latest
            python-version: "3.15"
            experimental: true
          - os: macos-latest
            python-version: "3.15"
            experimental: true
          - os: windows-latest
            python-version: "3.15"
            experimental: true

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      # Linux: Install PulseAudio dependencies
      - name: Install PulseAudio (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pulseaudio-utils libsamplerate0

      # macOS: Set up Swift toolchain
      - name: Verify Swift (macOS)
        if: runner.os == 'macOS'
        run: swift --version

      # Windows: Install libsamplerate via pip wheel
      - name: Install libsamplerate dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          # samplerate package includes prebuilt libsamplerate binaries
          echo "libsamplerate will be installed via pip"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install package with dev dependencies
        run: |
          pip install -e ".[dev]"

      # Try to install samplerate for high-quality resampling (optional)
      # This may fail on some platforms (e.g., Windows with Python 3.13+)
      - name: Install optional samplerate (may fail)
        run: |
          pip install samplerate || echo "samplerate installation failed, will use scipy fallback"
        continue-on-error: true

      # Note: contrib dependencies (faster-whisper) are optional
      # Tests are designed to work without them by skipping import-time errors

      - name: Run pytest
        run: |
          pytest

      - name: Run type checking (mypy)
        run: |
          mypy src/
